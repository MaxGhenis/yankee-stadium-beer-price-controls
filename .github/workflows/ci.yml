name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --locked --extra dev

    - name: Lint with ruff
      run: |
        uv run ruff check src tests

    - name: Check formatting with black
      run: |
        uv run black --check src tests

    - name: Type check with mypy
      run: |
        uv run mypy src/yankee_stadium_beer_controls

    - name: Run tests with pytest
      run: |
        uv run pytest tests/ -v --cov=yankee_stadium_beer_controls --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  package:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --locked --extra dev

    - name: Build package
      run: |
        uv run python -m build

    - name: Check package
      run: |
        uvx twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  paper:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --locked --extra dev

    - name: Setup Quarto
      uses: quarto-dev/quarto-actions/setup@v2
      with:
        tinytex: true

    - name: Build paper
      run: |
        uv run yankee-beer-paper render --project-dir paper
        uv run yankee-beer-paper submission --output-dir submissions

    - name: Upload paper artifact
      uses: actions/upload-artifact@v4
      with:
        name: paper
        path: |
          paper/_build/
          submissions/

  web:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install Python dependencies
      run: |
        uv sync --locked --extra dev

    - name: Generate web payload
      run: |
        uv run yankee-beer-web-data --output-dir web/public/data

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Build web app
      working-directory: web
      run: |
        npm ci
        npm run lint
        npm audit
        npm run build

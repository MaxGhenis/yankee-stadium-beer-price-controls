repos:
  - repo: local
    hooks:
      - id: refresh-paper-artifacts
        name: Refresh package-native paper artifacts
        entry: uv run yankee-beer-paper build --output-dir paper/_generated
        language: system
        files: '^(src/yankee_stadium_beer_controls/.*\.py|config\.yaml|paper/index\.qmd|paper/references\.bib)$'
        pass_filenames: false
        always_run: false

      - id: ruff-check
        name: Lint with ruff
        entry: uv run ruff check
        language: system
        types: [python]

      - id: black-check
        name: Format with black
        entry: uv run black
        language: system
        types: [python]
